version: 2
jobs:
  build:
    docker:
      - image: koalaman/shellcheck-alpine:v0.4.6
    steps:
      - run:
          name: Update apk
          command: apk update
      - run:
          name: Install git
          command: apk add git
      - checkout
      - run:
          name: Check Scripts
          command: |
            find '.' -type f -name '*.bash' -exec shellcheck --shell=bash '{}' \+
