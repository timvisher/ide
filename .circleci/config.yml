version: 2
jobs:
  build:
    docker:
      - image: ubuntu:14.04
    steps:
      - checkout
      - run:
          name: Install prerequisites
          command: |
            sudo apt update
            sudo apt install --asume-yes curl
            curl -sL https://deb.nodesource.com/setup_4.x | sudo -E bash -
            sudo apt install --assume-yes nodejs shellcheck
      - run:
          name: Run Tests
          command: make -k
