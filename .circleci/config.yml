version: 2
jobs:
  build:
    docker:
      - image: ubuntu:artful
    steps:
      - run:
          name: Install git
          command: apt update && apt install --assume-yes git
      - checkout
      - run:
          name: Install prerequisites
          command: |
            apt install --assume-yes curl
            curl -sL https://deb.nodesource.com/setup_4.x | bash -
            apt install --assume-yes nodejs build-essential shellcheck
      - run:
          name: Run Tests
          command: make -k
